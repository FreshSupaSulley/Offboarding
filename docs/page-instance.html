var lmsTopWindow = window.topWindowHelper ? topWindowHelper.getWindow() : window;
window.lmsInterstitial = {"whitelistedUrls":["'http://xyz.plateau.com:9090'","'http://abc.plateau.com:8080'"],"urlPrefix":"/interstitial?interstitialDest=","whitelistedDomains":["'performancemanager4.successfactors.com'","'successfactors.com'","'plateau.com'"],"version":"1.0"};
function waitForInterstitialResult (contextPath, url) {
    var selectedInterstitialUrl = checkInterstitialURL(contextPath, url);
    return new Promise(function (resolve, reject) {
        lmsTopWindow._setInterstitialResult = function (interstitialUrl) {
            window.interstitialResult = interstitialUrl || false;
            if (interstitialUrl) {
                resolve(interstitialUrl);
            } else {
                reject(false);
            }
        };
        selectedInterstitialUrl && lmsTopWindow._setInterstitialResult(selectedInterstitialUrl);
    });
}
function isExternalURL(url){
	var startWithHttp = /^(https?:)?\/\/.*/i; //if start with http:// or https://
    var checkInterstitial = (startWithHttp.exec(url) != null);
    if (checkInterstitial) {
        var loc = window.location;
        var port = loc.port;
        if (url.indexOf(loc.origin || (loc.protocol + '//' + loc.hostname + (port ? ':' + port : ''))) === 0) {
            //url start with the same domain as current window origin, so it is an internal URL.
            checkInterstitial = false;
        }
    }
return checkInterstitial;
}

function getHost(str) {
	// get host name from the given http url string based on the regex in
	// RFC2396 Appendix B.
	var parser = /^(?:([^:\/?#]+):)?(?:\/\/([^:\/?#]*))?([^?#]*)(?:\?([^#]*))?(?:#(.*))?/;
	var result = str.match(parser);
	return result[2];
}

function splitUrl(url) {
	if (url && url.indexOf('//') >= 0) {
		url = url.substring(url.indexOf('//') + 2);
	}
	return url;
}

function removeQuotes(url){
	if(url){
		url = url.substring(1, url.length - 1);
	}
	return url;
}

function isBlank(str) {
	return (!str || /^\s*$/.test(str));
}

function checkInterstitialURL (contextPath, url){
	var lmsInterstitial = window.lmsInterstitial;
	var isEnableInterstitialForExternalURL = document.getElementById("isEnableInterstitialForExternalURL").value;
	if((isEnableInterstitialForExternalURL === "true") && isExternalURL(url)){
		if(url && lmsInterstitial){
        		var whitelistedDomains = lmsInterstitial.whitelistedDomains;
        		var urlHost = getHost(url);
        		if (urlHost && whitelistedDomains) {
                	for (var i = 0; i < whitelistedDomains.length; i++) {
                		var domain = whitelistedDomains[i];
                		domain = removeQuotes(domain);
                		if (urlHost.indexOf(domain, urlHost.length - domain.length) !== -1) {
                			return url;
                		}
                	}
                }

                var whitelistedUrls = lmsInterstitial.whitelistedUrls;
                urlSplit = splitUrl(url);
                if (whitelistedUrls) {
                	var urlLowCase = urlSplit.toLowerCase();
                	for (var i = 0; i < whitelistedUrls.length; i++) {
                		var whitelistUrl = removeQuotes(whitelistedUrls[i]);
                		whitelistUrl = splitUrl(whitelistUrl);
             			if (!isBlank(whitelistUrl)	&& urlLowCase.indexOf(whitelistUrl.toLowerCase()) === 0) {
                			return url;
                		}
                	}
                }
        	}

        	return contextPath + lmsInterstitial.urlPrefix + encodeURIComponent(url);
	}
	return url;
}
lmsTopWindow.waitForInterstitialResult = waitForInterstitialResult;
lmsTopWindow.checkInterstitialURL = checkInterstitialURL;
